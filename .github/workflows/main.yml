name: Build WF

on: 
  push:
    branches:
      - main  # Dash ke baad space fix kar diya

jobs:
  Build:  # Job ka naam Capital 'B' se
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Meaven Build
        run: mvn clean install -DskipTests -Dnohttp.skip=true -Dcheckstyle.skip

  Testing:
    runs-on: ubuntu-latest
    needs: Build  # Build ke 'B' ko match kiya upar wale job se
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Run tests on main branch
        run: mvn test -Dnohttp.skip=true -Dcheckstyle.skip

      - name: Checkstyle
        run: mvn checkstyle:checkstyle -Dnohttp.skip=true