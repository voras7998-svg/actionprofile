name: Vprofile CICD Workflow

on:
  push:
    branches: 
      - main

  pull_request:
    branches:
      - main
    #branches: [ "main", "develop" ]

  workflow_dispatch:

  
  schedule:
    - cron: "10 14 * * 1-5"   # nightly run at 2 AM UTC

permissions:
  contents: read
jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Maven Build
        run: mvn install

      - name: Upload build artifact (WAR)
        uses: actions/upload-artifact@v4
        with:
          name: vprofile-app
          path: target/*.war

      - name: Notify if build fails
        if: failure()
        run: echo "Build failed! Please check the logs for details."


  Testing:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run tests on main branch
        if: github.ref == 'refs/heads/main'
        run: mvn test

      - name: Checkstyle
        if: github.ref == 'refs/heads/main'
        run: mvn checkstyle:checkstyle

      - name: Run tests on other branches
        if: github.ref != 'refs/heads/main'
        run: echo "Tests are only run on the main branch. Skipping tests for this branch."

  Security-Scan:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run triverry file system name
        uses: aquasecurity/trivy-action@0.11.2
        with:
          scan-type: fs
          scan-ref: .
          format: json
          exit-code: 0
          vuln-type: os,library
          output: trivy-results.json

      - name: Upload Trivy results as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.json